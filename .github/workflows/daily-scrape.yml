name: Daily Price Scrape

on:
  schedule:
    # Run at 06:00 UTC (14:00 PHT) daily
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Booking.com data via Claude Code Routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # The daily scrape is triggered by a Claude Code routine (see below).
          # This workflow processes the data file dropped by the routine.
          # If no fresh data, use the manual trigger with a data file.
          echo "Checking for fresh data..."
          if [ -f data/raw_booking_response.json ]; then
            echo "Processing fresh booking data..."
            python scraper/fetch_prices.py data/raw_booking_response.json
          else
            echo "No fresh data found. Skipping."
          fi

      - name: Copy data to docs for GitHub Pages
        run: |
          mkdir -p docs/data
          cp -f data/latest.json docs/data/ 2>/dev/null || true
          cp -f data/stats.json docs/data/ 2>/dev/null || true
          cp -f data/price_history.csv docs/data/ 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --cached --quiet || git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
          git push
